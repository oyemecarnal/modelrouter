# Model families for same-family fallback routing.
#
# When enterprise mode is OFF: on failure, router tries same-family cheaper
# models first before crossing to another provider.
#
# When enterprise mode is ON: routing is locked to a single family.
# Cross-family handoff only happens when explicitly triggered via the
# /enterprise/handoff API or the menu bar toggle.
#
# Tier order within a family: highest capability → cheapest.
# The router walks down the list on rate-limit or failure.

families:
  anthropic:
    provider: anthropic
    display: "Anthropic (Claude)"
    tiers:
      - id: claude-opus-4-8
        model: anthropic/claude-opus-4-8
        label: "Opus 4.8 — highest capability"
        cost_tier: 5
      - id: claude-sonnet
        model: anthropic/claude-sonnet-4-20250514
        label: "Sonnet 4.6 — balanced"
        cost_tier: 3
      - id: claude-haiku
        model: anthropic/claude-haiku-4-5-20251001
        label: "Haiku 4.5 — fast and cheap"
        cost_tier: 1

  openai:
    provider: openai
    display: "OpenAI (GPT)"
    tiers:
      - id: gpt-4o
        model: openai/gpt-4o
        label: "GPT-4o — flagship"
        cost_tier: 4
      - id: gpt-4o-mini
        model: openai/gpt-4o-mini
        label: "GPT-4o-mini — cheap"
        cost_tier: 1
      - id: o3-mini
        model: openai/o3-mini
        label: "o3-mini — reasoning, cheap"
        cost_tier: 2

  groq:
    provider: groq
    display: "Groq (Llama / Mixtral)"
    tiers:
      - id: groq-llama-70b
        model: groq/llama-3.3-70b-versatile
        label: "Llama 3.3 70B — best Groq quality"
        cost_tier: 2
      - id: groq-llama-8b
        model: groq/llama-3.1-8b-instant
        label: "Llama 3.1 8B — fastest / cheapest"
        cost_tier: 1

  google:
    provider: google
    display: "Google (Gemini)"
    tiers:
      - id: gemini-pro
        model: gemini/gemini-2.5-pro
        label: "Gemini 2.5 Pro — flagship"
        cost_tier: 4
      - id: gemini-flash
        model: gemini/gemini-2.0-flash
        label: "Gemini 2.0 Flash — fast"
        cost_tier: 2
      - id: gemini-flash-lite
        model: gemini/gemini-2.0-flash-lite
        label: "Gemini 2.0 Flash Lite — cheapest"
        cost_tier: 1

  mistral:
    provider: mistral
    display: "Mistral"
    tiers:
      - id: mistral-large
        model: mistral/mistral-large-latest
        label: "Mistral Large — best"
        cost_tier: 3
      - id: mistral-small
        model: mistral/mistral-small-latest
        label: "Mistral Small — cheap"
        cost_tier: 1

  deepseek:
    provider: deepseek
    display: "DeepSeek"
    tiers:
      - id: deepseek-r1
        model: deepseek/deepseek-r1
        label: "DeepSeek R1 — reasoning"
        cost_tier: 3
      - id: deepseek-chat
        model: deepseek/deepseek-chat
        label: "DeepSeek Chat — cheap"
        cost_tier: 1

  local:
    provider: ollama
    display: "Local (Ollama)"
    tiers:
      - id: ollama-llama
        model: ollama/llama3.2
        label: "Llama 3.2 (local)"
        cost_tier: 0
      - id: ollama-qwen
        model: ollama/qwen2.5-coder
        label: "Qwen 2.5 Coder (local)"
        cost_tier: 0

# Preset → canonical family assignment.
# In enterprise mode, a preset is locked to its family and only falls back
# within that family's tier list.
preset_families:
  smart: [anthropic, openai]       # try anthropic first, openai second
  fast: [groq, openai, google]
  cheap: [groq, mistral, deepseek]
  code: [anthropic, openai, groq]
  review: [openai, anthropic]
  hermes-fast: [groq, mistral]
  hermes-smart: [anthropic, openai]
  local: [local]
  offline: [local]
