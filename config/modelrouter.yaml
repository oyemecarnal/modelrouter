# ModelRouter — LiteLLM proxy configuration
# Docs: https://docs.litellm.ai/docs/proxy/configs

model_list:
  # ── Logical aliases (OpenRouter-style) ──────────────────────────────

  - model_name: smart
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
      rpm: 500
    model_info:
      mode: chat
      supports_function_calling: true

  - model_name: smart
    litellm_params:
      model: anthropic/claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY
      rpm: 500
    model_info:
      mode: chat
      supports_function_calling: true

  - model_name: fast
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY
      rpm: 1000
    model_info:
      mode: chat

  - model_name: fast
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GOOGLE_API_KEY
      rpm: 1000
    model_info:
      mode: chat

  - model_name: fast
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
      rpm: 2000
    model_info:
      mode: chat

  - model_name: fast
    litellm_params:
      model: mistral/mistral-small-latest
      api_key: os.environ/MISTRAL_API_KEY
      rpm: 1000
    model_info:
      mode: chat

  # Local Ollama (no key required)
  - model_name: local
    litellm_params:
      model: ollama/llama3.2
      api_base: os.environ/OLLAMA_API_BASE
      rpm: 2000
    model_info:
      mode: chat

  - model_name: local
    litellm_params:
      model: ollama/qwen2.5
      api_base: os.environ/OLLAMA_API_BASE
      rpm: 2000
    model_info:
      mode: chat

  # ── Passthrough provider models (call by name directly) ─────────────

  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GOOGLE_API_KEY

  - model_name: groq-llama
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY

  - model_name: groq-fast
    litellm_params:
      model: groq/llama-3.1-8b-instant
      api_key: os.environ/GROQ_API_KEY

  - model_name: mistral-small
    litellm_params:
      model: mistral/mistral-small-latest
      api_key: os.environ/MISTRAL_API_KEY

  - model_name: mistral-large
    litellm_params:
      model: mistral/mistral-large-latest
      api_key: os.environ/MISTRAL_API_KEY

  - model_name: groq/*
    litellm_params:
      model: groq/*
      api_key: os.environ/GROQ_API_KEY

  - model_name: mistral/*
    litellm_params:
      model: mistral/*
      api_key: os.environ/MISTRAL_API_KEY

  # Embeddings
  - model_name: embedding
    litellm_params:
      model: openai/text-embedding-3-small
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      mode: embedding

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 120
  allowed_fails: 3
  cooldown_time: 60
  retry_after: 5
  redis_host: os.environ/REDIS_HOST
  redis_port: os.environ/REDIS_PORT
  redis_password: os.environ/REDIS_PASSWORD

litellm_settings:
  drop_params: true
  set_verbose: false
  json_logs: true
  num_retries: 2
  request_timeout: 120
  max_budget: 0
  telemetry: false

  fallbacks:
    - smart: [fast, groq-llama, mistral-small, local]
    - fast: [groq-fast, mistral-small, local]
    - gpt-4o: [claude-sonnet, groq-llama, fast]

  context_window_fallbacks:
    - smart: [fast, local]

  cache: true
  cache_params:
    type: redis
    host: os.environ/REDIS_HOST
    port: os.environ/REDIS_PORT
    password: os.environ/REDIS_PASSWORD
    ttl: 3600

  success_callback: ["modelrouter.logging_callback.logging_callback"]
  failure_callback: ["modelrouter.logging_callback.logging_callback"]

general_settings:
  master_key: os.environ/MODELROUTER_MASTER_KEY
  proxy_batch_write_at: 60
  allow_requests_on_db_unavailable: true
  disable_error_logs: false
  background_health_checks: true
  health_check_interval: 300
  use_client_credentials_pass_through: false

environment_variables:
  OLLAMA_API_BASE: http://127.0.0.1:11434
  REDIS_HOST: 127.0.0.1
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ""
