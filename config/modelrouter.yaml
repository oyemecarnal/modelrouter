router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 120
  allowed_fails: 3
  cooldown_time: 60
  retry_after: 5
  redis_host: os.environ/REDIS_HOST
  redis_port: os.environ/REDIS_PORT
  redis_password: os.environ/REDIS_PASSWORD
litellm_settings:
  drop_params: true
  set_verbose: false
  json_logs: true
  num_retries: 2
  request_timeout: 120
  max_budget: 0
  telemetry: false
  fallbacks:
  - smart:
    - fast
    - groq-llama
    - mistral-small
    - local
  - fast:
    - groq-fast
    - mistral-small
    - local
  - gpt-4o:
    - claude-sonnet
    - groq-llama
    - fast
  - cheap:
    - mistral-small
    - groq-fast
    - local
  - code:
    - fast
    - groq-llama
    - mistral-small
    - local
  - review:
    - smart
    - fast
    - groq-llama
  - hermes-fast:
    - cheap
    - groq-fast
    - mistral-small
    - local
  - hermes-smart:
    - smart
    - code
    - fast
    - groq-llama
    - mistral-small
    - local
  - offline:
    - groq-fast
  - be-manager:
    - smart
    - code
    - fast
  context_window_fallbacks:
  - smart:
    - fast
    - local
  cache: true
  cache_params:
    type: redis
    host: os.environ/REDIS_HOST
    port: os.environ/REDIS_PORT
    password: os.environ/REDIS_PASSWORD
    ttl: 3600
  success_callback:
  - modelrouter.logging_callback.logging_callback
  failure_callback:
  - modelrouter.logging_callback.logging_callback
general_settings:
  master_key: os.environ/MODELROUTER_MASTER_KEY
  proxy_batch_write_at: 60
  allow_requests_on_db_unavailable: true
  disable_error_logs: false
  background_health_checks: true
  health_check_interval: 300
  use_client_credentials_pass_through: false
environment_variables:
  OLLAMA_API_BASE: http://127.0.0.1:11434
  REDIS_HOST: 127.0.0.1
  REDIS_PORT: '6379'
  REDIS_PASSWORD: ''
