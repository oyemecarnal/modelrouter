# Homelab hosts — SSH, paths, and ModelRouter URLs (generic template).
# Operator overrides: copy config/hosts.local.yaml.example → config/hosts.local.yaml (gitignored).
# Client→preset mapping: config/projects.yaml

gateway:
  url: http://gateway.local:3000  # mDNS / LAN hostname of always-on gateway host
  url_ssh_alias: http://gateway-mini:3000  # SSH Host alias only — use url for HTTP clients
  url_tailscale: http://100.64.0.1:3000  # gateway Tailscale IP — Linux clients without mDNS
  url_local: http://127.0.0.1:3000
  master_key_env: MODELROUTER_MASTER_KEY

hosts:
  laptop:
    description: Dev machine (Cursor, widget, git push)
    ssh: local
    modelrouter_path: ~/dev/modelrouter
    modelrouter_url: http://127.0.0.1:3000
    roles: [dev, cursor, keys-widget]

  gateway-mini:
    description: Always-on gateway and key store
    ssh: gateway-mini  # ~/.ssh/config Host alias
    modelrouter_path: ~/dev/modelrouter
    modelrouter_url: http://gateway.local:3000
    roles: [gateway, deploy-target, keys, tokens]

  gateway-tower:
    description: Agent/bot runtime (calls gateway-mini, does not host ModelRouter)
    ssh: gateway-tower
    modelrouter_url: http://gateway.local:3000
    roles: [runtime, agents]
    note: Remote clients use gateway.url or gateway.url_tailscale from this host
