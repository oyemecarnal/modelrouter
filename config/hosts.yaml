# Homelab hosts — single source for SSH, paths, and ModelRouter URLs.
# Override via env: MODELROUTER_REMOTE_HOST, KC_TOWER_SSH

gateway:
  url: http://kc-mini-lan:3000
  url_local: http://127.0.0.1:3000
  master_key_env: MODELROUTER_MASTER_KEY

hosts:
  laptop:
    description: Dev machine (Cursor, widget, git push)
    ssh: local
    modelrouter_path: /Users/kevinreed/dev/modelrouter
    modelrouter_url: http://127.0.0.1:3000
    roles: [dev, cursor, keys-widget]

  kc-mini:
    description: Always-on gateway, key store, smalshi compose
    ssh: kc-mini-lan
    modelrouter_path: /Users/kevinreed/dev/modelrouter
    modelrouter_url: http://kc-mini-lan:3000
    roles: [gateway, deploy-target, keys, tokens]

  kc-tower:
    description: Agent/bot runtime (Hermes, Kalshi, coinbot)
    ssh: kc-tower-lan  # override at runtime: KC_TOWER_SSH env in remote-health.sh
    modelrouter_url: http://kc-mini-lan:3000
    roles: [runtime, hermes, kalshi, coinbot]
    note: Does not host ModelRouter — calls kc-mini gateway on LAN

clients:
  smalshi-hermes:
    host: kc-tower
    gateway: kc-mini
    preset_routine: hermes-fast
    preset_complex: hermes-smart
  kalshi-bot:
    host: kc-tower
    gateway: kc-mini
    preset_routine: cheap
  coinbot:
    host: kc-tower
    gateway: kc-mini
    preset_routine: cheap
