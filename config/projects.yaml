# Per-project routing — which ModelRouter preset each consumer should use.
# Virtual keys (below) identify the project in logs; full spend isolation needs Docker+Postgres.
#
# Host notes:
#   kc-mini   — compose / deploy host for smalshi
#   kc-tower  — runs Hermes agent runtime
#   laptop    — dev

projects:
  smalshi-hermes:
    description: Hermes agent (composed on mini, runs on kc-tower)
    hosts: [kc-tower, kc-mini]
    presets:
      routine: hermes-fast
      complex: hermes-smart
    routing_hint: |
      Use hermes-fast for: status checks, short summaries, formatting, simple tool routing.
      Use hermes-smart for: multi-step plans, trading logic, anything that changes money or config.
    virtual_key_env: MODELROUTER_KEY_HERMES

  kalshi-bot:
    description: Kalshi trading bot
    hosts: [kc-tower, kc-mini]
    presets:
      routine: cheap
      analysis: code
      review: review
    virtual_key_env: MODELROUTER_KEY_KALSHI

  cursor-dev:
    description: Cursor IDE on laptop
    hosts: [laptop]
    presets:
      default: smart
      tab: fast
    virtual_key_env: MODELROUTER_KEY_CURSOR

  modelrouter-agents:
    description: Agency agent prompts / automation
    hosts: [laptop, kc-mini]
    presets:
      default: code
      review: review
    virtual_key_env: MODELROUTER_KEY_AGENTS

# Native (venv) mode: all virtual_key_env values default to MODELROUTER_MASTER_KEY.
# Docker + Postgres: run `make project-keys` after `make docker-up` for real isolation.

  parser-poster:
    description: Call Processor NPOC summarization
    hosts:
      - laptop
    presets:
      routine: cheap
      complex: offline
    virtual_key_env: MODELROUTER_KEY_PARSER_POSTER

  basisedge:
    description: BasisEdge commodity intelligence platform — agents, scrapers, newsletter AI, terminal
    hosts: [laptop, kc-tower]
    presets:
      # Planning, decisions, oversight — frontier only
      planning:   smart
      # Research synthesis, newsletter writing, model disagreement
      analysis:   smart
      # Code generation, executor tasks, scraper fixes
      code:       code
      # Bulk scraping, classification, tagging, translation polish
      scrape:     cheap
      # Accountant ROI math, HR task routing, admin
      admin:      cheap
      # Risk review, model anomaly flagging — never cheap
      risk:       review
      # Offline / local fallback
      local:      local
    routing_hint: |
      BasisEdge agents map to presets by cost tier:
        FRONTIER (smart/review): Manager, Researcher, Quant, Writer, Risk Manager
        CODE: Executor agent — all code tasks route here
        CHEAP: Scraper, Translator, Accountant, HR/Admin — bulk/batch work
      Never route risk or planning decisions through cheap.
      Never route bulk scraping through smart — it is wasteful.
      If ModelRouter is unreachable, agents fall back to platform/agents/fallback.py.
    virtual_key_env: MODELROUTER_KEY_BASISEDGE
