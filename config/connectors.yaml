# Connector registry — paste-key flows (Phase 2.5 SSOT)
# Scripts: scripts/connect-key.sh <id>
# Signup/pricing detail: config/api_catalog.yaml

version: 1

connectors:
  groq:
    label: Groq
    env: GROQ_API_KEY
    mode: paste_key
    validate: groq
    script: connect-key.sh
    signup: https://console.groq.com/keys
    presets: [cheap, hermes-fast]
    make_target: connect-groq

  anthropic:
    label: Anthropic
    env: ANTHROPIC_API_KEY
    mode: paste_key
    validate: anthropic
    script: connect-key.sh
    signup: https://console.anthropic.com/settings/keys
    presets: [hermes-smart, review]
    make_target: connect-anthropic

  openai:
    label: OpenAI
    env: OPENAI_API_KEY
    mode: paste_key
    validate: openai
    script: connect-key.sh
    signup: https://platform.openai.com/api-keys
    presets: [smart, code]
    make_target: connect-openai

  mistral:
    label: Mistral
    env: MISTRAL_API_KEY
    mode: paste_key
    validate: mistral
    script: connect-key.sh
    signup: https://console.mistral.ai
    presets: [code, mistral-small]
    make_target: connect-mistral

  google:
    label: Google
    env: GOOGLE_API_KEY
    mode: paste_key
    validate: google
    script: connect-key.sh
    signup: https://aistudio.google.com/apikey
    presets: [smart, cheap]
    make_target: connect-google

  deepseek:
    label: DeepSeek
    env: DEEPSEEK_API_KEY
    mode: paste_key
    validate: deepseek
    script: connect-key.sh
    signup: https://platform.deepseek.com
    presets: [cheap, fast]
    make_target: connect-deepseek

  together:
    label: Together
    env: TOGETHER_API_KEY
    mode: paste_key
    validate: together
    script: connect-key.sh
    signup: https://api.together.xyz
    presets: [cheap, fast]
    make_target: connect-together

  fireworks:
    label: Fireworks
    env: FIREWORKS_API_KEY
    mode: paste_key
    validate: fireworks
    script: connect-key.sh
    signup: https://fireworks.ai
    presets: [cheap, fast]
    make_target: connect-fireworks

  cohere:
    label: Cohere
    env: COHERE_API_KEY
    mode: paste_key
    validate: cohere
    script: connect-key.sh
    signup: https://dashboard.cohere.com
    presets: [cheap, code]
    make_target: connect-cohere
