# Connector registry — paste-key flows (Phase 2.5 SSOT)
# Scripts: scripts/connect-provider.sh → connect-{id}.sh
# Signup/pricing detail: config/api_catalog.yaml

version: 1

connectors:
  groq:
    label: Groq
    env: GROQ_API_KEY
    mode: paste_key
    validate: groq
    script: connect-groq.sh
    signup: https://console.groq.com/keys
    presets: [cheap, hermes-fast]
    make_target: connect-groq

  anthropic:
    label: Anthropic
    env: ANTHROPIC_API_KEY
    mode: paste_key
    validate: anthropic
    script: connect-anthropic.sh
    signup: https://console.anthropic.com/settings/keys
    presets: [hermes-smart, review]
    make_target: connect-anthropic

  openai:
    label: OpenAI
    env: OPENAI_API_KEY
    mode: paste_key
    validate: openai
    script: connect-openai.sh
    signup: https://platform.openai.com/api-keys
    presets: [smart, code]
    make_target: connect-openai

  mistral:
    label: Mistral
    env: MISTRAL_API_KEY
    mode: paste_key
    validate: mistral
    script: connect-mistral.sh
    signup: https://console.mistral.ai
    presets: [code, mistral-small]
    make_target: connect-mistral

  google:
    label: Google
    env: GOOGLE_API_KEY
    mode: paste_key
    validate: google
    script: connect-google.sh
    signup: https://aistudio.google.com/apikey
    presets: [smart, cheap]
    make_target: connect-google
