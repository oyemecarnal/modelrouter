# Copy to secrets.yaml — maps env var names to 1Password secret references.
# Loaded at startup by scripts/load_secrets.py via `op read`.
#
# Install CLI: brew install 1password-cli && op signin

secrets:
  # ── LLM providers (ModelRouter) ──
  OPENAI_API_KEY: op://Personal/OpenAI/credential
  ANTHROPIC_API_KEY: op://Personal/Anthropic/credential
  GOOGLE_API_KEY: op://Personal/Google AI/credential
  GEMINI_API_KEY: op://Personal/Google AI/credential
  OPENROUTER_API_KEY: op://Personal/OpenRouter/credential
  GROQ_API_KEY: op://Personal/Groq/credential
  TOGETHER_API_KEY: op://Personal/Together AI/credential
  MISTRAL_API_KEY: op://Personal/Mistral/credential
  DEEPSEEK_API_KEY: op://Personal/DeepSeek/credential
  COHERE_API_KEY: op://Personal/Cohere/credential
  PERPLEXITY_API_KEY: op://Personal/Perplexity/credential
  HUGGINGFACE_API_KEY: op://Personal/Hugging Face/credential
  FIREWORKS_API_KEY: op://Personal/Fireworks/credential
  XAI_API_KEY: op://Personal/xAI/credential

  # ── ModelRouter gateway ──
  MODELROUTER_MASTER_KEY: op://Personal/ModelRouter/master-key
  LITELLM_SALT_KEY: op://Personal/ModelRouter/salt-key

  # ── Other (not routed through ModelRouter, but useful on mini) ──
  CURSOR_API_KEY: op://Personal/Cursor/credential
  POLYGON_API_KEY: op://Personal/Polygon/credential
  TELEGRAM_BOT_TOKEN: op://Personal/Telegram Bot/credential

# Plain env fallbacks (used when 1Password ref is absent or CLI unavailable)
env_fallback: true
