  <!-- spokes: in from left -->
  <line x1="80" y1="180" x2="220" y2="240" stroke="#6EE7FF" stroke-width="14" stroke-linecap="round" opacity="0.6"/>
  <line x1="80" y1="256" x2="212" y2="256" stroke="#6EE7FF" stroke-width="14" stroke-linecap="round" opacity="0.6"/>
  <line x1="80" y1="332" x2="220" y2="272" stroke="#6EE7FF" stroke-width="14" stroke-linecap="round" opacity="0.6"/>
  <!-- spokes: out to right -->
  <line x1="292" y1="240" x2="432" y2="180" stroke="#6EE7FF" stroke-width="14" stroke-linecap="round" opacity="0.85"/>
  <line x1="300" y1="256" x2="432" y2="256" stroke="#6EE7FF" stroke-width="14" stroke-linecap="round" opacity="0.85"/>
  <line x1="292" y1="272" x2="432" y2="332" stroke="#6EE7FF" stroke-width="14" stroke-linecap="round" opacity="0.85"/>
