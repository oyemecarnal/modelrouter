<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ModelRouter Keys</title>
  <style>
    :root {
      color-scheme: dark;
      --bg0: #0a0b10;
      --bg1: #12141c;
      --glass: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f4f4f8;
      --muted: #8b8d98;
      --accent: #6ee7ff;
      --green: #3dd68c;
      --orange: #ffb020;
      --red: #ff5c5c;
      --track: rgba(255, 255, 255, 0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background:
        radial-gradient(120% 80% at 0% 0%, rgba(110, 231, 255, 0.12), transparent 50%),
        radial-gradient(90% 70% at 100% 100%, rgba(61, 214, 140, 0.08), transparent 45%),
        linear-gradient(160deg, var(--bg0), var(--bg1));
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    h1 {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .updated {
      font-size: 10px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .actions {
      display: flex;
      gap: 6px;
    }
    button {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--glass);
      color: var(--text);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }
    button:hover { border-color: rgba(110, 231, 255, 0.35); background: rgba(110, 231, 255, 0.08); }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.5; cursor: wait; }
    #scroll {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px 14px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.15) transparent;
    }
    .section-title {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin: 6px 2px 8px;
    }
    .card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 10px;
      margin-bottom: 7px;
      backdrop-filter: blur(8px);
    }
    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }
    .card-name {
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 8px currentColor;
    }
    .dot.ok { color: var(--green); background: var(--green); }
    .dot.error { color: var(--red); background: var(--red); }
    .dot.unavailable { color: #555; background: #555; box-shadow: none; }
    .dot.configured { color: var(--accent); background: var(--accent); }
    .badge {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      font-weight: 600;
    }
    .plan, .error {
      font-size: 10px;
      color: var(--muted);
      line-height: 1.35;
      margin-bottom: 4px;
    }
    .error { color: var(--orange); }
    .key-value {
      font-family: "SF Mono", ui-monospace, Menlo, monospace;
      font-size: 10px;
      color: #c8cad4;
      word-break: break-all;
    }
    .window { margin-top: 5px; }
    .window-row {
      display: grid;
      grid-template-columns: 52px 1fr 44px;
      gap: 6px;
      align-items: center;
      font-size: 10px;
    }
    .label { color: #b8bac6; }
    .bar {
      height: 5px;
      background: var(--track);
      border-radius: 99px;
      overflow: hidden;
    }
    .fill { height: 100%; border-radius: 99px; transition: width 0.35s ease; }
    .pct { text-align: right; font-variant-numeric: tabular-nums; color: var(--muted); }
    .detail { font-size: 9px; color: var(--muted); margin-top: 2px; }
    .empty {
      color: var(--muted);
      font-size: 11px;
      text-align: center;
      padding: 28px 12px;
    }
    .spin { display: inline-block; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <h1 id="app-title">ModelRouter Keys</h1>
      <div class="updated" id="updated">Loading…</div>
    </div>
    <div class="actions">
      <button id="btn-refresh" type="button" title="Fetch latest usage">↻ Refresh</button>
      <button id="btn-edit" type="button" title="Open keys file">✎ Edit</button>
    </div>
  </header>
  <div id="scroll">
    <div id="providers"></div>
  </div>
  <script>
    const primary = ['openai-codex', 'anthropic', 'cursor', 'gemini', 'openrouter', 'github-copilot', 'groq', 'mistral'];

    function barColor(remaining) {
      if (remaining >= 50) return 'var(--green)';
      if (remaining >= 20) return 'var(--orange)';
      return 'var(--red)';
    }

    function fmtReset(ts) {
      if (!ts) return '';
      const hours = Math.round((new Date(ts) - Date.now()) / 3600000);
      if (hours < 0) return 'resets soon';
      if (hours < 24) return `resets in ${hours}h`;
      return `resets in ${Math.floor(hours / 24)}d`;
    }

    function render(snapshot) {
      const updated = document.getElementById('updated');
      const root = document.getElementById('providers');
      if (!snapshot || !snapshot.providers) {
        updated.textContent = 'No data';
        root.innerHTML = '<div class="empty">Run Refresh or install the widget</div>';
        return;
      }

      if (snapshot.updatedAt) {
        updated.textContent = 'Updated ' + new Date(snapshot.updatedAt).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
      }

      const sorted = [...snapshot.providers].sort((a, b) => {
        const ai = primary.indexOf(a.id);
        const bi = primary.indexOf(b.id);
        if (ai !== -1 || bi !== -1) return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
        return (a.name || '').localeCompare(b.name || '');
      });

      const live = sorted.filter(p => p.kind !== 'configured');
      const keys = sorted.filter(p => p.kind === 'configured');

      function renderCard(p) {
        const isKey = p.kind === 'configured';
        const windows = (p.windows || []).map(w => {
          if (isKey) {
            return w.detail ? `<div class="key-value">${w.detail}</div>` : '';
          }
          const used = Number(w.used_percent || 0);
          const remaining = w.remaining_percent != null ? Number(w.remaining_percent) : Math.max(0, 100 - used);
          const detail = w.detail || fmtReset(w.reset_at);
          return `
            <div class="window">
              <div class="window-row">
                <span class="label">${w.label || 'Usage'}</span>
                <div class="bar"><div class="fill" style="width:${remaining}%;background:${barColor(remaining)}"></div></div>
                <span class="pct">${remaining.toFixed(0)}%</span>
              </div>
              ${detail ? `<div class="detail">${detail}</div>` : ''}
            </div>`;
        }).join('');

        return `
          <article class="card">
            <div class="card-head">
              <span class="card-name"><span class="dot ${p.status}"></span>${p.name || p.id}</span>
              <span class="badge">${p.status}</span>
            </div>
            ${p.plan && !isKey ? `<div class="plan">${p.plan}</div>` : ''}
            ${p.error ? `<div class="error">${p.error}</div>` : ''}
            ${isKey && p.plan ? `<div class="detail">${p.plan}</div>` : ''}
            ${windows}
          </article>`;
      }

      root.innerHTML =
        (live.length ? '<div class="section-title">Usage</div>' + live.map(renderCard).join('') : '') +
        (keys.length ? '<div class="section-title">API Keys</div>' + keys.map(renderCard).join('') : '') ||
        '<div class="empty">No providers configured</div>';
    }

    async function loadSnapshot() {
      const res = await fetch('/snapshot.json?' + Date.now());
      render(await res.json());
    }

    async function refreshAll() {
      const btn = document.getElementById('btn-refresh');
      btn.disabled = true;
      btn.innerHTML = '<span class="spin">↻</span>';
      try {
        await fetch('/refresh', { method: 'POST' });
        await new Promise(r => setTimeout(r, 800));
        await loadSnapshot();
      } catch (e) {
        document.getElementById('updated').textContent = 'Refresh failed';
      } finally {
        btn.disabled = false;
        btn.textContent = '↻ Refresh';
      }
    }

    async function openEdit() {
      try {
        await fetch('/edit', { method: 'POST' });
      } catch (e) {
        document.getElementById('updated').textContent = 'Edit failed';
      }
    }

    document.getElementById('btn-refresh').addEventListener('click', refreshAll);
    document.getElementById('btn-edit').addEventListener('click', openEdit);

    fetch('/meta.json').then(r => r.json()).then(m => {
      if (m.appName) document.getElementById('app-title').textContent = m.appName;
    }).catch(() => {});

    loadSnapshot();
    setInterval(loadSnapshot, 60000);
  </script>
</body>
</html>
